<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header / Navbar -->
  <header class="navbar">
    <div class="container nav-content">
      <h1 class="logo">Bun <span>cafe</span></h1>
      <nav>
        <ul class="nav-links">
          <li><a href="#home">Home</a></li>
          <li><a href="#menu">Menu</a></li>
          <li><a href="#gallery">Gallery</a></li>
          <li><a href="#reservation" class="active">Reservation</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero" id="home">
    <div class="overlay"></div>
    <div class="hero-content">
      <h2>Welcome to Our Restaurant</h2>
      <p>Enjoy the best food in town</p>
      <a href="#menu" class="btn">Learn More</a>

    </div>
  </section>

  <!-- Menu Section -->
  <section class="section" id="menu">
    <div class="container">
      <div class="section-title">
        <span></span>
        <h2>Our Menu</h2>
        <span></span>
      </div>

      <div class="menu-table-wrapper">
        <table class="menu-table">
          <thead>
            <tr>
              <th>Food</th>
              <th>Price</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Pizza</td>
              <td>$10</td>
            </tr>
            <tr>
              <td>Burger</td>
              <td>$8</td>
            </tr>
            <tr>
              <td>Pasta</td>
              <td>$12</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- Gallery Section -->
  <section class="section" id="gallery">
    <div class="container">
      <div class="section-title">
        <span></span>
        <h2>Food Gallery</h2>
        <span></span>
      </div>

      <div class="gallery-grid">
        <div class="gallery-item">
          <img src="images/pizza.jpeg" alt="Pizza">
           <h2>Pizza</h2>
        </div>
        <div class="gallery-item">
          <img src="images/br.jpeg" alt="Burger">
          <h2>Burger</h2>
        </div>
        <div class="gallery-item">
          <img src="images/pasta.jpeg" alt="Pasta">
          <h2>Pasta</h2>
        </div>
      </div>
    </div>
  </section>

  <!-- Reservation Section -->
  <section class="section" id="reservation">
    <div class="container">
      <div class="section-title">
        <span></span>
        <h2>Reserve a Table</h2>
        <span></span>
      </div>

      <div class="reservation-box">
        <form>
          <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" />
          </div>

          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" />
          </div>

          <div class="form-group">
            <label for="date">Date:</label>
            <input type="date" id="date" name="date" />
          </div>

          <button type="submit" class="btn">Book Now</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Location Section -->
  <section class="section" id="location">
    <div class="container">
      <div class="section-title">
        <span></span>
        <h2>Our Location</h2>
        <span></span>
      </div>

      <div class="map-box">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d26580.18612417127!2d34.37446207216999!3d31.433844175950664!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14fd834d7fb5c84f%3A0xe19c9760c83a9a2!2z2YXYt9i52YUg2YjZg9in2YHZitmHINin2YTYudin2LXZhdip!5e0!3m2!1sar!2s!4v1773085834777!5m2!1sar!2s" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
  </section>

</body>
</html>
