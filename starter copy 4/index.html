<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js form validation</title>
    <link rel="stylesheet" href="../starter copy 4/css/style.css">
    <link rel="stylesheet" href="../starter copy 4/css/all.min.css">
</head>

<body>
    <form action="">
        <div>
            <label for="">name <sup>*</sup></label>
            <input type="text" id="name" class="req" placeholder="your name..">
            <small>this field is required</small>
        </div>
        <div>
            <label for="">email <sup>*</sup></label>
            <input type="email" id="email" class="req" placeholder="your email..">
            <small>this field is required</small>
        </div>
        <div>
            <label for="">phone <sup>*</sup></label>
            <input type="number" class="req" placeholder=" enter your phone">
            <small>this field is required</small>
        </div>

        <div>
            <label for="">age </label>
            <input type="number" placeholder=" your age">
        </div>
        <button>Register</button>
        <a href="https://google.ps">Google</a>
    </form>

    <!-- <div class="parent">
        <div class="child"></div> -->
    </div>
    <script src="../starter copy 4/js/aap.js"></script>
</body>

</html>
